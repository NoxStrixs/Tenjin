# Flatpak manifest for Tenjin.
#
# Uses the KDE runtime, which ships Qt 6 — so we don't bundle Qt ourselves,
# keeping the Flatpak small and letting the runtime handle security updates.
#
# Build (on a host with flatpak + flatpak-builder; NOT inside Docker — Flatpak's
# bubblewrap sandbox does not nest reliably in Docker-in-WSL2):
#   flatpak install -y flathub org.kde.Sdk//6.7 org.kde.Platform//6.7
#   flatpak-builder --force-clean --user --install build-flatpak \
#       packaging/flatpak/app.tenjin.Tenjin.yml
#   flatpak build-bundle ~/.local/share/flatpak/repo \
#       dist/Tenjin.flatpak app.tenjin.Tenjin
#
# tools/scripts/package.py automates this via the `flatpak` target.
#
# NOTE: the runtime branch (6.7) is the KDE runtime version, which tracks a
# specific Qt release and is updated periodically. Verify the current branch
# with `flatpak remote-info flathub org.kde.Platform` and bump if needed; the
# app is source-built so it adapts to the runtime's Qt.

id: app.tenjin.Tenjin
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
command: Tenjin

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio          # TTS / media audio output
  - --filesystem=xdg-documents    # import/export to the user's Documents
  - --share=network               # optional cloud sync (currently stubbed)

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - '*.a'
  - '*.la'

modules:
  - name: tenjin
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DTENJIN_BUILD_GUI=ON
    sources:
      # Local source tree. For a reproducible/published build, replace with a
      # git source pinned to a tag or commit.
      - type: dir
        path: ../..
