# qmllint configuration for Tenjin.
#
# Purpose: catch, at build time, the class of QML errors that otherwise only
# surface at runtime (and sometimes only on one platform). The motivating case:
# a component that fails to register as a type — e.g. a property named `onPick`
# colliding with signal-handler syntax — which cascades into "X is not a type"
# and takes down the whole QML tree with no C++ compile error.
#
# Note: genuine unresolved-type / syntax errors are reported by qmllint as hard
# errors (non-zero exit) irrespective of the categories below, so `all_qmllint`
# catches the "not a type" case inherently. These settings promote the *other*
# anti-patterns that are warnings/info by default so they also fail the build.
#
# Run via:  ./tools/tool build --lint   (executes the all_qmllint target)
#
# Keys and levels (info | warning | disable) follow Qt's documented schema
# (doc.qt.io qmllint). Only real category keys are listed — an unknown key makes
# qmllint reject the file.

[General]
DisableDefaultImports=false

[Warnings]
# Signal handler attached to a non-existent signal, and the `on<Capital>`
# property/handler collision family. Directly relevant to the onPick bug.
BadSignalHandler=warning

# A module or type import that can't be resolved (e.g. a component missing from
# QML_FILES, so it never becomes an importable type).
ImportFailure=warning

# Unqualified property access — catches referencing an id/property that doesn't
# exist, including typos against Platform.* tokens (the textSecondary bug).
UnqualifiedAccess=warning

# Binding a value of the wrong type, or to a property that doesn't exist.
TypeError=warning
UnknownProperty=warning

# Missing required properties on a used component.
RequiredProperty=warning

# Deprecated components/properties — surfaces Qt5-ism drift across Qt 6 minors.
Deprecated=warning

# id/property/method inheritance cycles.
InheritanceCycle=warning

# Keep unused-import noise as info (doesn't fail the build; not correctness).
UnusedImports=info
