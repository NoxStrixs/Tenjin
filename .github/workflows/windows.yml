name: Windows build

# Builds Tenjin for Windows on windows-2022, publishes a zipped runtime
# directory as a Release asset.

on:
  workflow_dispatch:
  # Called by the release orchestrator (release.yml).
  workflow_call:

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-build:
    runs-on: windows-2022
    timeout-minutes: 60
    permissions:
      contents: write

    env:
      TENJIN_APP_NAME: Tenjin
      SCCACHE_DIR: ${{ github.workspace }}\.sccache
      SCCACHE_CACHE_SIZE: 500M
      CACHE_VERSION: v2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load .env into environment
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_ENV -Value "TENJIN_APP_NAME=Tenjin"
          if (Test-Path .env) {
            Get-Content .env | ForEach-Object {
              $line = $_.Trim()
              if ($line -eq "" -or $line.StartsWith("#")) { return }
              $eq = $line.IndexOf("=")
              if ($eq -lt 1) { return }
              $k = $line.Substring(0, $eq).Trim()
              $v = $line.Substring($eq + 1).Trim()
              if (($v.StartsWith('"') -and $v.EndsWith('"')) -or
                  ($v.StartsWith("'") -and $v.EndsWith("'"))) {
                $v = $v.Substring(1, $v.Length - 2)
              }
              Add-Content -Path $env:GITHUB_ENV -Value "$k=$v"
            }
          }

      # Seed empty translations/*.ts files if missing. PowerShell here-
      # string syntax for cross-platform parity with linux.yml.
      - name: Seed translation .ts files if missing
        shell: pwsh
        run: |
          $tsDir = "translations"
          if (-not (Test-Path $tsDir)) { New-Item -ItemType Directory -Path $tsDir | Out-Null }
          $langs = @("ja","es","fr","de","zh_CN","pt","ko","it","ru","ar")
          foreach ($lang in $langs) {
            $f = Join-Path $tsDir "tenjin_$lang.ts"
            if (-not (Test-Path $f)) {
              $content = "<?xml version=`"1.0`" encoding=`"utf-8`"?>`n<!DOCTYPE TS>`n<TS version=`"2.1`" language=`"$lang`">`n</TS>`n"
              Set-Content -Path $f -Value $content -NoNewline -Encoding UTF8
              Write-Host "  seeded empty $f"
            }
          }

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja & sccache
        shell: pwsh
        run: choco install -y ninja sccache nsis

      - name: Set up Python (for aqtinstall)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python build deps (Pillow for the .ico)
        run: python -m pip install --upgrade pillow

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.9.3"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2022_64"
          modules: "qtmultimedia"
          dir: ${{ github.workspace }}\Qt
          cache: true
          cache-key-prefix: ${{ env.CACHE_VERSION }}-install-qt-windows
          setup-python: false

      - name: Verify Qt Linguist tools (lupdate/lrelease)
        shell: pwsh
        run: |
          $QT_WIN = "${{ github.workspace }}\Qt\Qt\6.9.3\msvc2022_64"
          foreach ($t in @("lupdate.exe","lrelease.exe")) {
            $path = Join-Path "$QT_WIN\bin" $t
            if (-not (Test-Path $path)) {
              Write-Host "::error::$t missing at $path"
              Get-ChildItem "$QT_WIN\bin" | Select-Object -First 50
              exit 1
            }
          }
          & "$QT_WIN\bin\lrelease.exe" -version
          & "$QT_WIN\bin\lupdate.exe" -version

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ env.CACHE_VERSION }}-windows-sccache-${{ github.sha }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-windows-sccache-

      - name: Cache icon font
        uses: actions/cache@v4
        with:
          path: View/fonts/MaterialSymbolsOutlined.ttf
          key: ${{ env.CACHE_VERSION }}-iconfont-v1

      - name: Configure (CMake, Ninja)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $QT_WIN = "${{ github.workspace }}\Qt\Qt\6.9.3\msvc2022_64"
          $env:PATH = "$QT_WIN\bin;$env:PATH"
          cmake -G Ninja -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER_LAUNCHER=sccache `
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache `
            -DCMAKE_PREFIX_PATH="$QT_WIN" `
            -DMEDIA_SUPPORT=OFF `
            -DWEBVIEW_SUPPORT=OFF `
            -DSANITIZERS="" `
            -DTENJIN_BUILD_NUMBER="${{ github.run_number }}"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::cmake configure failed ($LASTEXITCODE)"
            exit $LASTEXITCODE
          }

      - name: List CMake targets
        shell: pwsh
        run: |
          Write-Host "===== top-level targets configured by CMake ====="
          cmake --build build --target help | Select-Object -First 80

      - name: Build executable target
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          sccache --start-server
          sccache --zero-stats
          cmake --build build --config Release --target $env:TENJIN_APP_NAME --verbose
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Build of target $env:TENJIN_APP_NAME failed with exit $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          Write-Host "===== sccache stats ====="
          sccache --show-stats

      - name: Install to staging tree (CMake + Qt deploy)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $QT_WIN = "${{ github.workspace }}\Qt\Qt\6.9.3\msvc2022_64"
          $env:PATH = "$QT_WIN\bin;$env:PATH"
          # Windows install(TARGETS) copies only the exe (the CMake deploy
          # script is Linux/macOS-only); windeployqt below completes the tree.
          cmake --install build --config Release --prefix "$env:GITHUB_WORKSPACE\stage"
          if ($LASTEXITCODE -ne 0) { Write-Host "::error::cmake --install failed"; exit $LASTEXITCODE }
          # qt_generate_deploy_qml_app_script deploys the QML backing DLLs but
          # leaves qml/ empty for our STATIC app module (its imports are compiled
          # into resources, so the import scanner finds nothing to copy). Run
          # windeployqt with --qmldir pointed at the top-level QML source folder
          # (the one containing Main.qml); it parses that folder + subfolders and
          # copies the QtQuick.Controls.Basic qmldir + .qml payload into qml\.
          # No --no-plugins (that suppresses the QML-module copy we need here).
          & "$QT_WIN\bin\windeployqt.exe" --release --qmldir "$env:GITHUB_WORKSPACE\View" `
              --no-translations `
              "$env:GITHUB_WORKSPACE\stage\bin\$env:TENJIN_APP_NAME.exe"
          if ($LASTEXITCODE -ne 0) { Write-Host "::error::windeployqt --qmldir failed"; exit $LASTEXITCODE }
          Write-Host "===== staged ====="
          Get-ChildItem -Path "$env:GITHUB_WORKSPACE\stage" -Recurse -Directory | Select-Object -First 40 FullName
          if (-not (Test-Path "$env:GITHUB_WORKSPACE\stage\bin\qml\QtQuick\Controls\Basic")) {
            Write-Host "::error::QtQuick.Controls.Basic QML tree still missing after windeployqt"
            exit 1
          }

      # Authenticode signing of installed binaries BEFORE packaging, so both the
      # NSIS installer and the ZIP contain signed executables. Skipped unless
      # WINDOWS_CERT_PFX_BASE64 / WINDOWS_CERT_PASSWORD are present
      # (see docs/SUBMISSION_CHECKLIST.md).
      - name: Sign staged binaries
        if: ${{ env.HAS_CERT == 'true' }}
        shell: pwsh
        env:
          HAS_CERT: ${{ secrets.WINDOWS_CERT_PFX_BASE64 != '' }}
          WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          $pfx = "$env:RUNNER_TEMP\cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERT_PFX_BASE64))
          Get-ChildItem "$env:GITHUB_WORKSPACE\stage" -Recurse -Include *.exe,*.dll | ForEach-Object {
            & signtool sign /f $pfx /p $env:WINDOWS_CERT_PASSWORD /fd SHA256 `
              /tr http://timestamp.digicert.com /td SHA256 $_.FullName
          }

      - name: Package (CPack NSIS + ZIP)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # windeployqt produced the complete self-contained tree in stage\bin.
          # Package that tree using the generated CPackConfig (which carries the
          # NSIS settings from Packaging.cmake), overriding the install source to
          # the staged dir and the output dir to pkg\. CPACK_INSTALLED_DIRECTORIES
          # "<dir>;." maps the staged tree to the package root.
          cpack --config "$env:GITHUB_WORKSPACE\build\CPackConfig.cmake" `
            -G "NSIS;ZIP" `
            -B "$env:GITHUB_WORKSPACE\pkg" `
            -D CPACK_INSTALLED_DIRECTORIES="$env:GITHUB_WORKSPACE\stage\bin;." `
            -D CPACK_PACKAGE_FILE_NAME="$env:TENJIN_APP_NAME-$env:TENJIN_APP_VERSION-windows"
          if ($LASTEXITCODE -ne 0) { Write-Host "::error::cpack failed"; exit $LASTEXITCODE }
          $pkgs = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\pkg" -Recurse -Include *.exe,*.zip |
                  Where-Object { $_.Name -like "$env:TENJIN_APP_NAME-*windows*" }
          if (-not $pkgs) { Write-Host "::error::No CPack artifacts produced"; exit 1 }
          $pkgs | ForEach-Object { Write-Host "  packaged: $($_.FullName)" }

      # Sign the NSIS installer .exe itself, gated identically.
      - name: Sign NSIS installer
        if: ${{ env.HAS_CERT == 'true' }}
        shell: pwsh
        env:
          HAS_CERT: ${{ secrets.WINDOWS_CERT_PFX_BASE64 != '' }}
          WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          $pfx = "$env:RUNNER_TEMP\cert.pfx"
          if (-not (Test-Path $pfx)) {
            [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERT_PFX_BASE64))
          }
          Get-ChildItem "$env:GITHUB_WORKSPACE\pkg" -Recurse -Include *.exe |
            Where-Object { $_.Name -like "$env:TENJIN_APP_NAME-*windows*" } | ForEach-Object {
              & signtool sign /f $pfx /p $env:WINDOWS_CERT_PASSWORD /fd SHA256 `
                /tr http://timestamp.digicert.com /td SHA256 $_.FullName
            }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tenjin-windows
          path: |
            pkg/${{ env.TENJIN_APP_NAME }}-*windows*.exe
            pkg/${{ env.TENJIN_APP_NAME }}-*windows*.zip
          if-no-files-found: error
          retention-days: 7
