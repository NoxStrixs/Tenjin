name: Windows build

# Builds Tenjin for Windows on windows-2022, publishes a zipped runtime
# directory as a Release asset.
#
# Note on the build target: `cmake --build build --config Release` on its
# own builds the default target (ninja's `all`), which sometimes produced
# only the static libraries on past CI runs while silently skipping the
# executable. To make the failure mode visible, this workflow lists the
# generated targets up front and then builds `Tenjin` (the executable
# target) explicitly. If linking fails, the workflow halts here instead
# of advancing to a "binary not found" branch downstream.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-build:
    runs-on: windows-2022
    permissions:
      contents: write

    env:
      TENJIN_APP_NAME: Tenjin
      SCCACHE_DIR: ${{ github.workspace }}\.sccache
      SCCACHE_CACHE_SIZE: 500M

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load .env into environment
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_ENV -Value "TENJIN_APP_NAME=Tenjin"
          if (Test-Path .env) {
            Get-Content .env | ForEach-Object {
              $line = $_.Trim()
              if ($line -eq "" -or $line.StartsWith("#")) { return }
              $eq = $line.IndexOf("=")
              if ($eq -lt 1) { return }
              $k = $line.Substring(0, $eq).Trim()
              $v = $line.Substring($eq + 1).Trim()
              if (($v.StartsWith('"') -and $v.EndsWith('"')) -or
                  ($v.StartsWith("'") -and $v.EndsWith("'"))) {
                $v = $v.Substring(1, $v.Length - 2)
              }
              Add-Content -Path $env:GITHUB_ENV -Value "$k=$v"
            }
          }

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja & sccache
        shell: pwsh
        run: choco install -y ninja sccache

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2022_64"
          modules: "qtmultimedia"
          dir: ${{ github.workspace }}\Qt
          cache: true

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: windows-sccache-${{ github.sha }}
          restore-keys: |
            windows-sccache-

      - name: Configure (CMake, Ninja)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $QT_WIN = "${{ github.workspace }}\Qt\Qt\6.8.3\msvc2022_64"
          $env:PATH = "$QT_WIN\bin;$env:PATH"
          cmake -G Ninja -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER_LAUNCHER=sccache `
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache `
            -DCMAKE_PREFIX_PATH="$QT_WIN" `
            -DMEDIA_SUPPORT=OFF `
            -DWEBVIEW_SUPPORT=OFF `
            -DBUILD_TESTS=OFF `
            -DBUILD_BENCHMARKS=OFF `
            -DSANITIZERS="" `
            -DTENJIN_BUILD_NUMBER="${{ github.run_number }}"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::cmake configure failed ($LASTEXITCODE)"
            exit $LASTEXITCODE
          }

      # Dump the available CMake targets up front. If the executable
      # target isn't named "Tenjin" the next step will fail loud and we
      # can adjust without guessing what name CMake picked.
      - name: List CMake targets
        shell: pwsh
        run: |
          Write-Host "===== top-level targets configured by CMake ====="
          cmake --build build --target help | Select-Object -First 80

      - name: Build executable target
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          sccache --start-server
          sccache --zero-stats
          # Force-build the executable target by name. If the link fails
          # (e.g. missing plugin, MSVC error, dependency not found), the
          # workflow stops here instead of advancing with no binary.
          cmake --build build --config Release --target $env:TENJIN_APP_NAME --verbose
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Build of target $env:TENJIN_APP_NAME failed with exit $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          Write-Host "===== sccache stats ====="
          sccache --show-stats

      - name: Locate built binary
        shell: pwsh
        run: |
          Write-Host "===== all .exe files under build/ ====="
          $allExe = Get-ChildItem -Path build -Recurse -Filter '*.exe' -File -ErrorAction SilentlyContinue
          $allExe | ForEach-Object { Write-Host "  $($_.FullName)  ($([math]::Round($_.Length/1KB, 1)) KB)" }
          # Filter out CMake's compiler-id probe binaries.
          $exe = $allExe `
            | Where-Object { $_.FullName -notmatch 'CompilerId|CMakeFiles\\3' } `
            | Where-Object { $_.BaseName -ieq $env:TENJIN_APP_NAME } `
            | Select-Object -First 1
          if (-not $exe) {
            Write-Host "::error::No '$($env:TENJIN_APP_NAME).exe' found in build tree"
            exit 1
          }
          Add-Content -Path $env:GITHUB_ENV -Value "TENJIN_EXE=$($exe.FullName)"

      - name: windeployqt
        shell: pwsh
        run: |
          $QT_WIN = "${{ github.workspace }}\Qt\Qt\6.8.3\msvc2022_64"
          $stage = "stage\$env:TENJIN_APP_NAME"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          Copy-Item -Path $env:TENJIN_EXE -Destination $stage
          & "$QT_WIN\bin\windeployqt.exe" --release --no-translations `
              --no-system-d3d-compiler --no-opengl-sw `
              "$stage\$env:TENJIN_APP_NAME.exe"
          Write-Host "===== staged ====="
          Get-ChildItem -Path $stage | Select-Object -First 30
          Add-Content -Path $env:GITHUB_ENV -Value "TENJIN_STAGE=$stage"

      - name: Package zip
        shell: pwsh
        run: |
          $zip = "$env:TENJIN_APP_NAME-${{ github.run_number }}-windows-x64.zip"
          Compress-Archive -Path "$env:TENJIN_STAGE\*" -DestinationPath $zip -Force
          $size = (Get-Item $zip).Length / 1MB
          Write-Host "Packaged: $zip  ($([math]::Round($size, 1)) MB)"
          Add-Content -Path $env:GITHUB_ENV -Value "TENJIN_ZIP=$zip"

      - name: Publish .zip to a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: windows-build-${{ github.run_number }}
          name: Windows build ${{ github.run_number }}
          files: ${{ env.TENJIN_ZIP }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
