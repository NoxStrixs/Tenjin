name: Windows build

# Builds Tenjin for Windows on windows-2022 and publishes a zipped runtime
# directory (binary + Qt runtime + plugins) as a GitHub Release asset.
#
# Optimizations:
#   - install-qt-action cache → warm Qt restore in ~5s.
#   - sccache (Mozilla's Rust port of ccache, works with MSVC where ccache
#     doesn't) via the CMAKE_*_COMPILER_LAUNCHER variables.
#   - Ninja generator.
#   - Single-config Release.
#   - Concurrency group cancels in-flight runs on the same branch.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-build:
    runs-on: windows-2022
    permissions:
      contents: write

    env:
      TENJIN_APP_NAME: Tenjin
      SCCACHE_DIR: ${{ github.workspace }}\.sccache
      SCCACHE_CACHE_SIZE: 500M

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load .env into environment
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_ENV -Value "TENJIN_APP_NAME=Tenjin"
          if (Test-Path .env) {
            Get-Content .env | ForEach-Object {
              $line = $_.Trim()
              if ($line -eq "" -or $line.StartsWith("#")) { return }
              $eq = $line.IndexOf("=")
              if ($eq -lt 1) { return }
              $k = $line.Substring(0, $eq).Trim()
              $v = $line.Substring($eq + 1).Trim()
              if (($v.StartsWith('"') -and $v.EndsWith('"')) -or
                  ($v.StartsWith("'") -and $v.EndsWith("'"))) {
                $v = $v.Substring(1, $v.Length - 2)
              }
              Add-Content -Path $env:GITHUB_ENV -Value "$k=$v"
            }
          }

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja & sccache
        shell: pwsh
        run: choco install -y ninja sccache

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2022_64"
          modules: "qtmultimedia"
          dir: ${{ github.workspace }}\Qt
          cache: true

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: windows-sccache-${{ github.sha }}
          restore-keys: |
            windows-sccache-

      - name: Configure (CMake, Ninja)
        shell: pwsh
        run: |
          $QT_WIN = "${{ github.workspace }}\Qt\Qt\6.8.3\msvc2022_64"
          $env:PATH = "$QT_WIN\bin;$env:PATH"
          cmake -G Ninja -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER_LAUNCHER=sccache `
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache `
            -DCMAKE_PREFIX_PATH="$QT_WIN" `
            -DMEDIA_SUPPORT=OFF `
            -DWEBVIEW_SUPPORT=OFF `
            -DBUILD_TESTS=OFF `
            -DBUILD_BENCHMARKS=OFF `
            -DSANITIZERS="" `
            -DTENJIN_BUILD_NUMBER="${{ github.run_number }}"

      - name: Build (verbose)
        shell: pwsh
        run: |
          sccache --start-server
          sccache --zero-stats
          # Verbose to surface any silent failures.
          cmake --build build --config Release --verbose
          echo "===== sccache stats ====="
          sccache --show-stats

      # Broader, case-insensitive exe search. The previous narrow `-Filter`
      # only matched in the immediate output dir; CMake on Windows often
      # nests the binary under build\App\ or build\App\Release\. Walk the
      # whole build tree, skip CMake's compiler-id probe binaries, and dump
      # everything found for diagnostics.
      - name: Locate built binary
        shell: pwsh
        run: |
          Write-Host "===== all .exe files under build/ ====="
          $allExe = Get-ChildItem -Path build -Recurse -Filter '*.exe' -File -ErrorAction SilentlyContinue
          $allExe | ForEach-Object { Write-Host "  $($_.FullName)  ($([math]::Round($_.Length/1KB, 1)) KB)" }

          # Try several patterns, most specific first.
          $candidates = @(
            @{ Filter = "$env:TENJIN_APP_NAME.exe"; Description = "exact match by name" },
            @{ Filter = "*Tenjin*.exe";             Description = "fuzzy Tenjin match" }
          )
          $exe = $null
          foreach ($c in $candidates) {
            $found = $allExe | Where-Object { $_.Name -ilike $c.Filter -and $_.FullName -notmatch 'CompilerId|CMakeFiles\\3' } | Select-Object -First 1
            if ($found) {
              Write-Host "Matched via: $($c.Description) → $($found.FullName)"
              $exe = $found
              break
            }
          }
          if (-not $exe) {
            Write-Host "::error::No Tenjin executable found in build tree"
            exit 1
          }
          Add-Content -Path $env:GITHUB_ENV -Value "TENJIN_EXE=$($exe.FullName)"

      - name: windeployqt
        shell: pwsh
        run: |
          $QT_WIN = "${{ github.workspace }}\Qt\Qt\6.8.3\msvc2022_64"
          $stage = "stage\$env:TENJIN_APP_NAME"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          Copy-Item -Path $env:TENJIN_EXE -Destination $stage
          & "$QT_WIN\bin\windeployqt.exe" --release --no-translations `
              --no-system-d3d-compiler --no-opengl-sw `
              "$stage\$env:TENJIN_APP_NAME.exe"
          Write-Host "===== staged ====="
          Get-ChildItem -Path $stage | Select-Object -First 30
          Add-Content -Path $env:GITHUB_ENV -Value "TENJIN_STAGE=$stage"

      - name: Package zip
        shell: pwsh
        run: |
          $zip = "$env:TENJIN_APP_NAME-${{ github.run_number }}-windows-x64.zip"
          Compress-Archive -Path "$env:TENJIN_STAGE\*" -DestinationPath $zip -Force
          $size = (Get-Item $zip).Length / 1MB
          Write-Host "Packaged: $zip  ($([math]::Round($size, 1)) MB)"
          Add-Content -Path $env:GITHUB_ENV -Value "TENJIN_ZIP=$zip"

      - name: Publish .zip to a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: windows-build-${{ github.run_number }}
          name: Windows build ${{ github.run_number }}
          files: ${{ env.TENJIN_ZIP }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
