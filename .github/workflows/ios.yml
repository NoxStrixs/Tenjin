name: iOS build

# Builds Tenjin for iOS on a macOS runner and produces an UNSIGNED device .ipa
# you can sideload. CI cannot sign with a free Apple account, so signing happens
# on your side:
#
#   AltStore / Sideloadly (no Mac needed after CI):
#     1. Download the unsigned .ipa from the GitHub Release this run creates.
#     2. Open it in AltStore (Sideload .ipa…) or Sideloadly, sign in with your
#        free Apple ID. It re-signs with your account and installs to your iPhone.
#        AltStore auto-renews every 7 days; Sideloadly is manual.
#
#   Xcode (on your Mac), if you prefer:
#     ./tools/ios-configure.sh && open build-ios/$TENJIN_APP_NAME.xcodeproj
#     Set your Apple ID team in Signing & Capabilities, plug in the phone, Run.
#
# Translations: CI assumes translations/*.ts are committed. lrelease
# compiles them at build time via qt_add_translations. Empty stubs are
# seeded if absent so the build never fails on a fresh clone.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-build:
    runs-on: macos-14
    timeout-minutes: 90
    permissions:
      contents: write

    env:
      CACHE_VERSION: v2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load .env into environment
        run: |
          echo "TENJIN_APP_NAME=Tenjin"                             >> "$GITHUB_ENV"
          echo "TENJIN_APP_DISPLAY_NAME=Tenjin"                     >> "$GITHUB_ENV"
          echo "TENJIN_BUNDLE_ID=app.tenjin.Tenjin"                 >> "$GITHUB_ENV"
          echo "TENJIN_IOS_DEPLOYMENT_TARGET=16.0"                  >> "$GITHUB_ENV"
          if [ -f .env ]; then
            awk -F= '
              /^[[:space:]]*#/  { next }
              /^[[:space:]]*$/  { next }
              NF < 2            { next }
              {
                key=$1; $1=""; val=substr($0, 2)
                sub(/^[[:space:]]+/, "", key); sub(/[[:space:]]+$/, "", key)
                sub(/^[[:space:]]+/, "", val); sub(/[[:space:]]+$/, "", val)
                gsub(/\r/, "", val)
                if (val ~ /^".*"$/ || val ~ /^'\''.*'\''$/) {
                  val = substr(val, 2, length(val) - 2)
                }
                print key "=" val
              }
            ' .env >> "$GITHUB_ENV"
          fi

      - name: Seed translation .ts files if missing
        run: |
          mkdir -p translations
          for lang in ja es fr de zh_CN pt ko it ru ar; do
            f="translations/tenjin_${lang}.ts"
            if [ ! -f "$f" ]; then
              cat > "$f" <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <!DOCTYPE TS>
          <TS version="2.1" language="${lang}">
          </TS>
          EOF
              echo "  seeded empty $f"
            fi
          done

      # Patch 1: comment out QSQLiteDriverPlugin static imports in
      # App/CMakeLists.txt. On iOS Qt is static so this is harmless to
      # leave — but if the persistent fix (wrapping in if(IOS OR ANDROID))
      # hasn't landed yet this keeps iOS CI green in the meantime.
      - name: Patch App/CMakeLists.txt — QSQLiteDriverPlugin (iOS guard)
        run: |
          if [ -f App/CMakeLists.txt ]; then
            if grep -qE 'QSQLiteDriverPlugin' App/CMakeLists.txt; then
              # Only comment out lines that aren't already guarded by an
              # if(IOS ...) block. Simple heuristic: if the file already has
              # `if(IOS` near that line, skip patching.
              if ! grep -qE 'if\s*\(\s*IOS' App/CMakeLists.txt; then
                cp App/CMakeLists.txt App/CMakeLists.txt.bak
                sed -i '' 's|.*Qt6::QSQLiteDriverPlugin.*|# &  # patched by ios.yml — guarded pending persistent fix|' App/CMakeLists.txt
                echo "Patched QSQLiteDriverPlugin lines:"
                grep -n 'QSQLiteDriverPlugin' App/CMakeLists.txt
              else
                echo "QSQLiteDriverPlugin already guarded — no patch needed."
              fi
            else
              echo "No QSQLiteDriverPlugin reference — nothing to patch."
            fi
          fi

      # Patch 2: Info_plist.in path detection.
      # configure_file() in App/CMakeLists.txt may have a hardcoded relative
      # path that doesn't resolve from the build directory. Patch it to use
      # CMAKE_CURRENT_SOURCE_DIR so it always resolves correctly.
      - name: Patch App/CMakeLists.txt — Info_plist.in path
        run: |
          if [ -f App/CMakeLists.txt ]; then
            # If the file references Info_plist.in without CMAKE_CURRENT_SOURCE_DIR, fix it.
            if grep -qE 'configure_file\s*\(\s*[^$].*Info_plist\.in' App/CMakeLists.txt; then
              cp App/CMakeLists.txt App/CMakeLists.txt.bak2 2>/dev/null || true
              # Replace bare path references to Info_plist.in with absolute path.
              # Pattern: configure_file( "some/path/Info_plist.in" -> configure_file( "${CMAKE_CURRENT_SOURCE_DIR}/ios/Info_plist.in"
              sed -i '' \
                's|configure_file(\s*"\([^"]*Info_plist\.in\)"|configure_file("${CMAKE_CURRENT_SOURCE_DIR}/ios/Info_plist.in"|g' \
                App/CMakeLists.txt
              echo "After Info_plist.in patch:"
              grep -n 'Info_plist' App/CMakeLists.txt
            else
              echo "Info_plist.in reference already uses a variable or was not found — no patch needed."
            fi
          fi

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Set up Python (for aqtinstall)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt (macOS host)
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: "mac"
          target: "desktop"
          arch: "clang_64"
          modules: "qtmultimedia"
          dir: ${{ github.workspace }}/Qt
          cache: true
          cache-key-prefix: ${{ env.CACHE_VERSION }}-install-qt-ios-host
          setup-python: false

      - name: Install Qt (iOS target)
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: "mac"
          target: "ios"
          modules: "qtmultimedia"
          dir: ${{ github.workspace }}/Qt
          cache: true
          cache-key-prefix: ${{ env.CACHE_VERSION }}-install-qt-ios-target
          setup-python: false

      - name: Verify Qt Linguist tools on host (lupdate/lrelease)
        run: |
          QT_HOST="${{ github.workspace }}/Qt/Qt/6.8.3/macos"
          for t in lupdate lrelease; do
            if [ ! -x "$QT_HOST/bin/$t" ]; then
              echo "::error::Qt $t missing at $QT_HOST/bin/$t"
              ls "$QT_HOST/bin" | head -50
              exit 1
            fi
          done
          "$QT_HOST/bin/lrelease" -version

      - name: Debug
        run: |
          echo "===== FULL FILE WITH LINE NUMBERS ====="
          awk '{printf("%4d | %s\n", NR, $0)}' App/CMakeLists.txt"

      - name: Configure (qt-cmake, Xcode generator)
        run: |
          QT_IOS="${{ github.workspace }}/Qt/Qt/6.8.3/ios"
          QT_HOST="${{ github.workspace }}/Qt/Qt/6.8.3/macos"
          "$QT_IOS/bin/qt-cmake" -G Xcode -S . -B build-ios \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="$TENJIN_IOS_DEPLOYMENT_TARGET" \
            -DQT_HOST_PATH="$QT_HOST" \
            -DMEDIA_SUPPORT=OFF \
            -DWEBVIEW_SUPPORT=OFF \
            -DBUILD_TESTS=OFF \
            -DBUILD_BENCHMARKS=OFF \
            -DSANITIZERS="" \
            -DTENJIN_BUILD_NUMBER="${{ github.run_number }}"

      - name: Build (device, unsigned)
        run: |
          cmake --build build-ios --config Release -- \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Verify bundle
        run: |
          APP=$(find build-ios -name "${TENJIN_APP_NAME}.app" -type d | head -n1)
          if [ -z "$APP" ]; then echo "::error::${TENJIN_APP_NAME}.app not found"; exit 1; fi
          echo "App bundle: $APP"
          PLIST="$APP/Info.plist"
          echo "===== FULL Info.plist (as built) ====="
          plutil -p "$PLIST"
          echo "===== bundle top-level contents ====="
          ls -la "$APP"
          echo "===== executable check ====="
          EXE=$(plutil -extract CFBundleExecutable raw "$PLIST")
          echo "CFBundleExecutable = $EXE"
          if [ ! -f "$APP/$EXE" ]; then
            echo "::error::Bundle executable '$EXE' is missing from the .app!"
            exit 1
          fi
          file "$APP/$EXE"
          echo "===== plist validity ====="
          plutil -lint "$PLIST"
          PLIST_BUNDLE_ID=$(plutil -extract CFBundleIdentifier raw "$PLIST")
          if [ "$PLIST_BUNDLE_ID" != "$TENJIN_BUNDLE_ID" ]; then
            echo "::error::Bundle id mismatch: plist='$PLIST_BUNDLE_ID' env='$TENJIN_BUNDLE_ID'"
            exit 1
          fi
          ls "$APP"/AppIcon*.png 2>/dev/null && echo "icon present" \
            || echo "::warning::No AppIcon*.png in bundle."
          echo "Bundle verified."

      - name: Ad-hoc sign all Mach-O binaries in the bundle
        run: |
          APP=$(find build-ios -name "${TENJIN_APP_NAME}.app" -type d | head -n1)
          echo "Re-signing every framework in: $APP/Frameworks"
          if [ -d "$APP/Frameworks" ]; then
            for FW in "$APP"/Frameworks/*.framework; do
              [ -d "$FW" ] || continue
              echo "  ad-hoc signing $FW"
              codesign --force --sign - --timestamp=none "$FW"
            done
          else
            echo "  (no Frameworks/ dir; nothing to sign)"
          fi
          echo "Ad-hoc signing main executable"
          codesign --force --sign - --timestamp=none "$APP"
          echo "===== verify signatures ====="
          codesign -dv --verbose=2 "$APP" 2>&1 | head -20
          if [ -d "$APP/Frameworks" ]; then
            for FW in "$APP"/Frameworks/*.framework; do
              [ -d "$FW" ] || continue
              echo "--- $(basename $FW) ---"
              codesign -dv "$FW" 2>&1 | grep -E "Identifier|TeamIdentifier|Signature" || true
            done
          fi

      - name: Package unsigned .ipa
        run: |
          APP=$(find build-ios -name "${TENJIN_APP_NAME}.app" -type d | head -n1)
          IPA="${TENJIN_APP_NAME}-unsigned.ipa"
          rm -rf payload && mkdir -p payload/Payload
          cp -RP "$APP" payload/Payload/
          ( cd payload && ditto -c -k --keepParent --sequesterRsrc Payload "../$IPA" )
          echo "Built $(du -h "$IPA" | cut -f1) unsigned ipa"
          unzip -t "$IPA" >/dev/null && echo "archive integrity OK"
          echo "top-level entries:"
          unzip -Z1 "$IPA" | sed -n '1,5p'
          unzip -Z1 "$IPA" | grep -q '^Payload/' \
            && echo "Payload/ at top level — OK" \
            || { echo "::error::archive does not start with Payload/"; exit 1; }
          echo "TENJIN_IPA_PATH=$IPA" >> "$GITHUB_ENV"

      - name: Publish .ipa to a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-build-${{ github.run_number }}
          name: iOS build ${{ github.run_number }}
          files: ${{ env.TENJIN_IPA_PATH }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
