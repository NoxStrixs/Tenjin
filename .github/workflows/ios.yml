name: iOS build

# Builds Tenjin for iOS on a macOS runner and produces an UNSIGNED device .ipa
# you can sideload. CI cannot sign with a free Apple account, so signing happens
# on your side:
#
#   AltStore / Sideloadly (no Mac needed after CI):
#     1. Download the "tenjin-ios-unsigned-ipa" artifact from this run.
#     2. Open it in AltStore (Sideload .ipa…) or Sideloadly, sign in with your
#        free Apple ID. It re-signs with your account and installs to your iPhone.
#        AltStore auto-renews every 7 days; Sideloadly is manual.
#
#   Xcode (on your Mac), if you prefer:
#     ./tools/ios-configure.sh && open build-ios/Tenjin.xcodeproj
#     Set your Apple ID team in Signing & Capabilities, plug in the phone, Run.
#
# Free Apple ID: app runs 7 days then must be re-signed. Paid ($99/yr): 1 year.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ios-build:
    runs-on: macos-14
    # Needed so the workflow's GITHUB_TOKEN can create a Release and upload the
    # .ipa asset. The default token is read-only since 2023.
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install Qt (macOS host)
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: "mac"
          target: "desktop"
          arch: "clang_64"
          modules: "qtmultimedia"
          dir: ${{ github.workspace }}/Qt
          cache: true

      - name: Install Qt (iOS target)
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: "mac"
          target: "ios"
          modules: "qtmultimedia"
          dir: ${{ github.workspace }}/Qt
          cache: true

      - name: Configure (qt-cmake, Xcode generator)
        run: |
          QT_IOS="${{ github.workspace }}/Qt/Qt/6.8.3/ios"
          QT_HOST="${{ github.workspace }}/Qt/Qt/6.8.3/macos"
          "$QT_IOS/bin/qt-cmake" -G Xcode -S . -B build-ios \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DQT_HOST_PATH="$QT_HOST" \
            -DMEDIA_SUPPORT=OFF \
            -DWEBVIEW_SUPPORT=OFF \
            -DBUILD_TESTS=OFF \
            -DBUILD_BENCHMARKS=OFF \
            -DSANITIZERS="" \
            -DTENJIN_BUILD_NUMBER="${{ github.run_number }}"

      # Build for the device SDK, unsigned. AltStore/Sideloadly will sign it.
      - name: Build (device, unsigned)
        run: |
          cmake --build build-ios --config Release -- \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      # Sanity-check the bundle before packaging: executable, plist keys, and a
      # compiled app icon must all be present, or the sideload will look broken.
      - name: Verify bundle
        run: |
          APP=$(find build-ios -name "Tenjin.app" -type d | head -n1)
          if [ -z "$APP" ]; then echo "::error::Tenjin.app not found"; exit 1; fi
          echo "App bundle: $APP"
          PLIST="$APP/Info.plist"
          echo "===== FULL Info.plist (as built) ====="
          plutil -p "$PLIST"
          echo "===== bundle top-level contents ====="
          ls -la "$APP"
          echo "===== executable check ====="
          EXE=$(plutil -extract CFBundleExecutable raw "$PLIST")
          echo "CFBundleExecutable = $EXE"
          if [ ! -f "$APP/$EXE" ]; then
            echo "::error::Bundle executable '$EXE' is missing from the .app!"
            exit 1
          fi
          file "$APP/$EXE"
          echo "===== plist validity ====="
          plutil -lint "$PLIST"
          # AppIcon should have compiled into the bundle.
          ls "$APP"/AppIcon*.png 2>/dev/null && echo "icon present" \
            || echo "::warning::No AppIcon*.png in bundle."
          echo "Bundle verified."

      # Re-sign every Mach-O in the bundle with an ad-hoc signature using Apple's
      # `codesign` tool. Why: Qt ships the FFmpeg .framework binaries with The Qt
      # Company's Team ID. When AltStore re-signs the IPA on install it replaces
      # the MAIN binary's signature with your free Apple ID team's Team ID — but
      # AltStore's framework re-signing (via ldid on Windows) is unreliable for
      # nested .framework bundles. The mismatch makes dyld's Library Validation
      # reject the FFmpeg frameworks at launch and the kernel SIGKILLs the
      # process before main() runs (no .ips crash report is produced — exactly
      # the "black flash, instant exit" symptom on iOS 26).
      #
      # Ad-hoc signing every Mach-O here gives AltStore a known-clean starting
      # state: all signatures are the same (none — ad-hoc), AltStore replaces
      # them uniformly with the user's team identity, and dyld accepts the
      # bundle.
      - name: Ad-hoc sign all Mach-O binaries in the bundle
        run: |
          APP=$(find build-ios -name "Tenjin.app" -type d | head -n1)
          echo "Re-signing every framework in: $APP/Frameworks"
          if [ -d "$APP/Frameworks" ]; then
            for FW in "$APP"/Frameworks/*.framework; do
              [ -d "$FW" ] || continue
              echo "  ad-hoc signing $FW"
              codesign --force --sign - --timestamp=none "$FW"
            done
          else
            echo "  (no Frameworks/ dir; nothing to sign)"
          fi
          echo "Ad-hoc signing main executable"
          codesign --force --sign - --timestamp=none "$APP"
          echo "===== verify signatures ====="
          codesign -dv --verbose=2 "$APP" 2>&1 | head -20
          if [ -d "$APP/Frameworks" ]; then
            for FW in "$APP"/Frameworks/*.framework; do
              [ -d "$FW" ] || continue
              echo "--- $(basename $FW) ---"
              codesign -dv "$FW" 2>&1 | grep -E "Identifier|TeamIdentifier|Signature" || true
            done
          fi

      # Package the .app into an unsigned .ipa (Payload/<App>.app structure).
      #
      # Use `ditto`, Apple's archiver, NOT `zip`. The bundle now contains a
      # Frameworks/ folder (embedded FFmpeg) whose .framework dirs use SYMLINKS.
      # Plain `zip -qry` compresses and mishandles those symlinks, producing an
      # archive that AltStore's strict zip parser rejects the instant you select
      # it ("couldn't be read because it isn't in the right format"). `ditto`
      # preserves symlinks and bundle structure correctly. `cp -RP` likewise
      # preserves symlinks instead of dereferencing them.
      - name: Package unsigned .ipa
        run: |
          APP=$(find build-ios -name "Tenjin.app" -type d | head -n1)
          rm -rf payload && mkdir -p payload/Payload
          cp -RP "$APP" payload/Payload/
          # ditto -c -k = create a PKZip archive; --keepParent keeps the Payload
          # dir as the top-level entry, exactly what the IPA format expects.
          ( cd payload && ditto -c -k --keepParent --sequesterRsrc Payload ../Tenjin-unsigned.ipa )
          echo "Built $(du -h Tenjin-unsigned.ipa | cut -f1) unsigned ipa"
          echo "===== verify archive is readable and well-formed ====="
          # unzip -t tests integrity; the listing must start with Payload/.
          unzip -t Tenjin-unsigned.ipa >/dev/null && echo "archive integrity OK"
          echo "top-level entries:"
          unzip -Z1 Tenjin-unsigned.ipa | sed -n '1,5p'
          unzip -Z1 Tenjin-unsigned.ipa | grep -q '^Payload/' \
            && echo "Payload/ at top level — OK" \
            || { echo "::error::archive does not start with Payload/"; exit 1; }

      # Publish the .ipa as a GitHub Release asset rather than an Actions
      # artifact. Three reasons:
      #   1. Release assets are the RAW file — AltStore gets a real .ipa, not the
      #      zip-wrapped-in-a-zip that actions/upload-artifact produces (that
      #      wrapper is why AltStore reports "not in the right format").
      #   2. Releases do NOT count against the Actions artifact storage quota.
      #   3. Each build gets a stable, direct download URL.
      - name: Publish .ipa to a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-build-${{ github.run_number }}
          name: iOS build ${{ github.run_number }}
          files: Tenjin-unsigned.ipa
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
