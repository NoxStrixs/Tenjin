name: Android build

# Builds Tenjin for Android on ubuntu-24.04. Publishes a debug-signed APK
# as a Release asset.
#
# Translations: CI assumes translations/*.ts are committed. lrelease
# compiles them at build time via qt_add_translations. Empty stubs are
# seeded if absent so the build never fails on a fresh clone.

on:
  workflow_dispatch:
  # Called by the release orchestrator (release.yml).
  workflow_call:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: write

    env:
      TENJIN_APP_NAME: Tenjin
      CCACHE_MAXSIZE: 500M
      CCACHE_COMPRESS: "true"
      ANDROID_ABI: arm64-v8a
      ANDROID_PLATFORM: android-34
      ANDROID_NDK_VERSION: "26.1.10909125"
      CACHE_VERSION: v2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tenjin setup (Python, fonts, env, translations)
        uses: ./.github/actions/tenjin-setup
        with:
          qt-host: linux
          install-qt: "false"
          cache-key-prefix: ${{ env.CACHE_VERSION }}-android
          extra-defaults: echo "TENJIN_APP_NAME=Tenjin" >> "$GITHUB_ENV"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0 ndk;${{ env.ANDROID_NDK_VERSION }}"

      - name: Install Qt (host / desktop)
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.9.3"
          host: "linux"
          target: "desktop"
          arch: "linux_gcc_64"
          modules: "qtmultimedia qtspeech"
          dir: ${{ github.workspace }}/Qt
          cache: true
          cache-key-prefix: ${{ env.CACHE_VERSION }}-install-qt-android-host
          setup-python: false

      - name: Install Qt for Android
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.9.3"
          host: "linux"
          target: "android"
          arch: "android_arm64_v8a"
          modules: "qtmultimedia qtspeech"
          dir: ${{ github.workspace }}/Qt
          cache: true
          cache-key-prefix: ${{ env.CACHE_VERSION }}-install-qt-android-arm64
          setup-python: false

      - name: Verify Qt Linguist tools on host (lupdate/lrelease)
        run: |
          QT_HOST="${{ github.workspace }}/Qt/Qt/6.9.3/gcc_64"
          for t in lupdate lrelease; do
            if [ ! -x "$QT_HOST/bin/$t" ]; then
              echo "::error::Qt $t missing at $QT_HOST/bin/$t"
              exit 1
            fi
          done
          "$QT_HOST/bin/lrelease" -version

      - name: System packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build ccache cmake

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ env.CACHE_VERSION }}-android-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-android-gradle-

      - name: Cache icon font
        uses: actions/cache@v4
        with:
          path: View/fonts/MaterialSymbolsOutlined.ttf
          key: ${{ env.CACHE_VERSION }}-iconfont-v1

      - name: Configure (CMake via qt-cmake)
        run: |
          QT_HOST="${{ github.workspace }}/Qt/Qt/6.9.3/gcc_64"
          QT_ANDROID="${{ github.workspace }}/Qt/Qt/6.9.3/android_arm64_v8a"
          export PATH="$QT_ANDROID/bin:$QT_HOST/bin:$PATH"
          export ANDROID_NDK_ROOT="$ANDROID_SDK_ROOT/ndk/${{ env.ANDROID_NDK_VERSION }}"

          "$QT_ANDROID/bin/qt-cmake" -G Ninja -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DANDROID_ABI=${{ env.ANDROID_ABI }} \
            -DANDROID_PLATFORM=${{ env.ANDROID_PLATFORM }} \
            -DQT_HOST_PATH="$QT_HOST" \
            -DMEDIA_SUPPORT=OFF \
            -DWEBVIEW_SUPPORT=OFF \
            -DSANITIZERS="" \
            -DTENJIN_BUILD_NUMBER="${{ github.run_number }}"

      - name: Build native libraries
        run: |
          ccache --max-size=$CCACHE_MAXSIZE
          cmake --build build --config Release

      - name: Build APK
        run: cmake --build build --target apk

      # Signed AAB for Play submission. Skipped entirely unless the keystore
      # secrets are present, so the default (free-tier) run produces only the
      # debug-signed APK below. To enable: add repository secrets
      # ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS,
      # ANDROID_KEY_PASSWORD (see docs/SUBMISSION_CHECKLIST.md).
      - name: Build & sign AAB (release)
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        env:
          HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/upload.keystore"
          cmake --build build --target aab
          AAB=$(find build -name "*.aab" -type f | head -n1)
          if [ -z "$AAB" ]; then echo "::error::No AAB produced"; exit 1; fi
          "$ANDROID_SDK_ROOT"/build-tools/*/apksigner sign \
            --ks "$RUNNER_TEMP/upload.keystore" \
            --ks-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --key-pass "pass:${{ secrets.ANDROID_KEY_PASSWORD }}" \
            "$AAB"
          OUT="${TENJIN_APP_NAME}-${TENJIN_APP_VERSION}-android.aab"
          cp "$AAB" "$OUT"
          echo "TENJIN_AAB=$OUT" >> "$GITHUB_ENV"

      - name: Locate APK
        run: |
          APK=$(find build -name "*.apk" -type f | grep -i release | head -n1)
          if [ -z "$APK" ]; then
            APK=$(find build -name "*.apk" -type f | head -n1)
          fi
          if [ -z "$APK" ]; then
            echo "::error::No APK produced"
            find build -maxdepth 6 -name '*.apk' -type f
            exit 1
          fi
          OUT="${TENJIN_APP_NAME}-${TENJIN_APP_VERSION}-android.apk"
          cp "$APK" "$OUT"
          du -h "$OUT"
          echo "TENJIN_APK=$OUT" >> "$GITHUB_ENV"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tenjin-android
          path: |
            ${{ env.TENJIN_APK }}
            ${{ env.TENJIN_AAB }}
          if-no-files-found: error
          retention-days: 7
