name: Linux build

# Builds Tenjin for Linux on ubuntu-24.04 (GCC 13+ for <expected>).
# Publishes an AppImage as a GitHub Release asset.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    env:
      TENJIN_APP_NAME: Tenjin
      CCACHE_MAXSIZE: 500M
      CCACHE_COMPRESS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load .env into environment
        run: |
          echo "TENJIN_APP_NAME=Tenjin" >> "$GITHUB_ENV"
          if [ -f .env ]; then
            awk -F= '
              /^[[:space:]]*#/ { next } /^[[:space:]]*$/ { next } NF < 2 { next }
              { k=$1; $1=""; v=substr($0,2);
                sub(/^[[:space:]]+/,"",k); sub(/[[:space:]]+$/,"",k);
                sub(/^[[:space:]]+/,"",v); sub(/[[:space:]]+$/,"",v);
                if (v ~ /^".*"$/ || v ~ /^'\''.*'\''$/) v=substr(v,2,length(v)-2);
                print k "=" v
              }
            ' .env >> "$GITHUB_ENV"
          fi

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ninja-build ccache cmake \
            libgl1-mesa-dev libxkbcommon-x11-0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-sync1 libxcb-xfixes0 libxcb-xinerama0 \
            libxcb-xkb1 libxkbcommon0 libfontconfig1 \
            libfuse2t64 patchelf wget file librsvg2-bin
          echo "===== compiler versions ====="
          gcc --version
          g++ --version
          echo "===== <expected> available? ====="
          echo '#include <expected>' | g++ -std=c++23 -E -xc++ - >/dev/null && echo "OK" || (echo "MISSING — abort" && exit 1)

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: "linux"
          target: "desktop"
          arch: "linux_gcc_64"
          modules: "qtmultimedia"
          dir: ${{ github.workspace }}/Qt
          cache: true

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: linux-ccache-${{ github.sha }}
          restore-keys: |
            linux-ccache-

      - name: Configure (CMake, Ninja)
        run: |
          QT_LINUX="${{ github.workspace }}/Qt/Qt/6.8.3/gcc_64"
          export PATH="$QT_LINUX/bin:$PATH"
          cmake -G Ninja -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_PREFIX_PATH="$QT_LINUX" \
            -DMEDIA_SUPPORT=OFF \
            -DWEBVIEW_SUPPORT=OFF \
            -DBUILD_TESTS=OFF \
            -DBUILD_BENCHMARKS=OFF \
            -DSANITIZERS="" \
            -DTENJIN_BUILD_NUMBER="${{ github.run_number }}"

      - name: Build
        run: |
          ccache --max-size=$CCACHE_MAXSIZE
          ccache --zero-stats
          cmake --build build --config Release
          echo "===== ccache stats ====="
          ccache --show-stats

      - name: Locate built binary
        run: |
          BIN=$(find build -name "$TENJIN_APP_NAME" -type f -executable | head -n1)
          if [ -z "$BIN" ]; then
            echo "::error::Built binary not found"
            find build -maxdepth 4 -type f -executable | head -20
            exit 1
          fi
          echo "Binary: $BIN"
          file "$BIN"
          du -h "$BIN"
          echo "TENJIN_BIN=$BIN" >> "$GITHUB_ENV"

      - name: Package AppImage
        run: |
          QT_LINUX="${{ github.workspace }}/Qt/Qt/6.8.3/gcc_64"
          export PATH="$QT_LINUX/bin:$PATH"
          export LD_LIBRARY_PATH="$QT_LINUX/lib:$LD_LIBRARY_PATH"

          mkdir -p AppDir/usr/bin \
                   AppDir/usr/share/applications \
                   AppDir/usr/share/icons/hicolor/scalable/apps \
                   AppDir/usr/share/icons/hicolor/256x256/apps
          cp "$TENJIN_BIN" AppDir/usr/bin/

          # Desktop file — prefer the repo's if present.
          if [ -f tenjin.desktop ]; then
            cp tenjin.desktop AppDir/usr/share/applications/
            cp tenjin.desktop AppDir/
          else
            cat > AppDir/usr/share/applications/tenjin.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=Tenjin
          Exec=Tenjin
          Icon=tenjin
          Categories=Education;
          EOF
            cp AppDir/usr/share/applications/tenjin.desktop AppDir/
          fi

          # Icon. linuxdeployqt rejects zero-byte files, so the previous
          # `touch tenjin.png` fallback was useless. Prefer the repo's SVG
          # (rasterize to PNG so legacy desktop environments without SVG
          # support still show an icon); otherwise inline a real 16×16 PNG.
          if [ -f tenjin.svg ]; then
            cp tenjin.svg AppDir/usr/share/icons/hicolor/scalable/apps/tenjin.svg
            cp tenjin.svg AppDir/tenjin.svg
            rsvg-convert -w 256 -h 256 tenjin.svg -o AppDir/usr/share/icons/hicolor/256x256/apps/tenjin.png
            cp AppDir/usr/share/icons/hicolor/256x256/apps/tenjin.png AppDir/tenjin.png
          else
            echo "::warning::tenjin.svg not in repo; AppImage will ship a placeholder icon"
            # Minimal valid 16×16 transparent PNG (113 bytes). Not pretty
            # but linuxdeployqt accepts it.
            python3 -c "import base64,sys; sys.stdout.buffer.write(base64.b64decode('iVBORw0KGgoAAAANSUhEUgAAABAAAAAQAQMAAAAlPW0iAAAABlBMVEUAAAD///+l2Z/dAAAACklEQVQI12NgAAAAAgAB4iG8MwAAAABJRU5ErkJggg=='))" > AppDir/tenjin.png
            cp AppDir/tenjin.png AppDir/usr/share/icons/hicolor/256x256/apps/tenjin.png
          fi

          wget -q https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
          chmod +x linuxdeployqt-continuous-x86_64.AppImage
          export APPIMAGE_EXTRACT_AND_RUN=1
          ./linuxdeployqt-continuous-x86_64.AppImage \
            AppDir/usr/share/applications/tenjin.desktop \
            -appimage -qmake="$QT_LINUX/bin/qmake6" \
            -extra-plugins=sqldrivers,imageformats \
            -bundle-non-qt-libs -unsupported-allow-new-glibc -verbose=1

          IMG=$(ls Tenjin-*.AppImage 2>/dev/null | head -n1)
          if [ -z "$IMG" ]; then
            echo "::error::No AppImage produced"
            ls -la
            exit 1
          fi
          echo "TENJIN_APPIMAGE=$IMG" >> "$GITHUB_ENV"
          echo "Built: $IMG  ($(du -h $IMG | cut -f1))"

      - name: Publish AppImage to a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: linux-build-${{ github.run_number }}
          name: Linux build ${{ github.run_number }}
          files: ${{ env.TENJIN_APPIMAGE }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
