name: Linux build

# Builds Tenjin for Linux on ubuntu-24.04 (GCC 13+ for <expected>).
# Publishes an AppImage as a GitHub Release asset.
#
# Translations: CI assumes translations/*.ts are committed. We do NOT
# run `tool translation` here (it needs ~2GB of PyTorch + Argos models).
# lrelease compiles whatever .ts files exist into .qm at build time via
# qt_add_translations. If translations/ is absent we seed empty .ts
# files so the build still succeeds.

on:
  workflow_dispatch:
  # Called by the release orchestrator (release.yml).
  workflow_call:

concurrency:
  group: linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write

    env:
      TENJIN_APP_NAME: Tenjin
      CCACHE_MAXSIZE: 500M
      CCACHE_COMPRESS: "true"
      # Bump this to invalidate all caches without changing keys.
      CACHE_VERSION: v2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
           build-essential ninja-build ccache cmake \
           libgl1-mesa-dev libxkbcommon-x11-0 libdbus-1-3 \
           libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
           libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
           libxcb-sync1 libxcb-xfixes0 libxcb-xinerama0 \
           libxcb-xkb1 libxkbcommon0 libfontconfig1 \
           libfuse2t64 patchelf wget file librsvg2-bin
          # Fail fast if the toolchain lacks C++23 <expected> (Result_t<T>).
          echo '#include <expected>' | g++ -std=c++23 -E -xc++ - >/dev/null \
            || { echo "::error::C++23 <expected> unavailable"; exit 1; }

      - name: Tenjin setup (Python, fonts, Qt, ccache)
        uses: ./.github/actions/tenjin-setup
        with:
          qt-host: linux
          qt-arch: linux_gcc_64
          cache-key-prefix: ${{ env.CACHE_VERSION }}-linux
          extra-defaults: echo "TENJIN_APP_NAME=Tenjin" >> "$GITHUB_ENV"

      - name: Verify Qt Linguist tools (lupdate/lrelease)
        run: |
          QT_LINUX="${{ github.workspace }}/Qt/Qt/6.9.3/gcc_64"
          for t in lupdate lrelease; do
            if [ ! -x "$QT_LINUX/bin/$t" ]; then
              echo "::error::Qt $t missing at $QT_LINUX/bin/$t. qt_add_translations will fail."
              ls "$QT_LINUX/bin" | head -50
              exit 1
            fi
          done
          "$QT_LINUX/bin/lrelease" -version
          "$QT_LINUX/bin/lupdate" -version

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ env.CACHE_VERSION }}-linux-ccache-${{ github.sha }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-linux-ccache-

      - name: Cache icon font
        uses: actions/cache@v4
        with:
          path: View/fonts/MaterialSymbolsOutlined.ttf
          key: ${{ env.CACHE_VERSION }}-iconfont-v1

      - name: Configure (CMake, Ninja)
        run: |
          QT_LINUX="${{ github.workspace }}/Qt/Qt/6.9.3/gcc_64"
          export PATH="$QT_LINUX/bin:$PATH"
          cmake -G Ninja -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_PREFIX_PATH="$QT_LINUX" \
            -DMEDIA_SUPPORT=OFF \
            -DWEBVIEW_SUPPORT=OFF \
            -DSANITIZERS="" \
            -DTENJIN_BUILD_NUMBER="${{ github.run_number }}"

      - name: Build
        run: |
          ccache --max-size=$CCACHE_MAXSIZE
          cmake --build build --config Release

      - name: Locate built binary
        run: |
          BIN=$(find build -name "$TENJIN_APP_NAME" -type f -executable | head -n1)
          if [ -z "$BIN" ]; then
            echo "::error::Built binary not found"
            find build -maxdepth 4 -type f -executable | head -20
            exit 1
          fi
          echo "Binary: $BIN"
          file "$BIN"
          du -h "$BIN"
          echo "TENJIN_BIN=$BIN" >> "$GITHUB_ENV"

      - name: Package AppImage
        run: |
          QT_LINUX="${{ github.workspace }}/Qt/Qt/6.9.3/gcc_64"
          export PATH="$QT_LINUX/bin:$PATH"
          export LD_LIBRARY_PATH="$QT_LINUX/lib:$LD_LIBRARY_PATH"

          # 1. Prepare AppDir structural layout
          mkdir -p AppDir/usr/bin \
                   AppDir/usr/share/applications \
                   AppDir/usr/share/icons/hicolor/256x256/apps

          cp "${{ github.workspace }}/build/bin/Tenjin" AppDir/usr/bin/Tenjin

          # 2. Setup Desktop File
          cat > AppDir/usr/share/applications/tenjin.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=Tenjin
          Exec=Tenjin
          Icon=tenjin
          Categories=Education;
          EOF

          # 3. Setup Assets
          if [ -f tenjin.svg ]; then
            rsvg-convert -w 256 -h 256 tenjin.svg -o AppDir/usr/share/icons/hicolor/256x256/apps/tenjin.png
          else
            echo "::warning::tenjin.svg not found; extracting placeholder"
            python3 -c "import base64,sys; sys.stdout.buffer.write(base64.b64decode('iVBORw0KGgoAAAANSUhEUgAAABAAAAAQAQMAAAAlPW0iAAAABlBMVEUAAAD///+l2Z/dAAAACklEQVQI12NgAAAAAgAB4iG8MwAAAABJRU5ErkJggg=='))" > AppDir/usr/share/icons/hicolor/256x256/apps/tenjin.png
          fi

          # 4. Download modern linuxdeploy + Qt6 plugin
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -O linuxdeploy
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage -O linuxdeploy-plugin-qt
          chmod +x linuxdeploy linuxdeploy-plugin-qt

          # 4.5 Strip unused Qt SQL driver plugins before deployment.
          # linuxdeploy-plugin-qt bundles every .so it finds under
          # plugins/sqldrivers, not just the one Tenjin actually loads
          # (QSQLITE). The Qt 6.8 install also ships libqsqlmimer.so and
          # libqsqlmysql.so, which link against libmimerapi.so /
          # libmysqlclient.so — third-party client libraries that aren't
          # installed on this runner (and never will be, since Tenjin only
          # opens a local SQLite database). Their absence makes
          # linuxdeploy-plugin-qt abort with
          # "ERROR: Could not find dependency: libmimerapi.so" before it
          # ever reaches libqsqlite.so. Removing the drivers we don't ship
          # is the documented workaround (see linuxdeploy/linuxdeploy-plugin-qt#153).
          SQLDRIVERS_DIR="$QT_LINUX/plugins/sqldrivers"
          find "$SQLDRIVERS_DIR" -maxdepth 1 -name '*.so' ! -name 'libqsqlite.so' -delete

          # 5. Execute deployment using updated variable standards
          export QMAKE="$QT_LINUX/bin/qmake6"
          export EXTRA_QT_MODULES="core qml quick controls sql imageformats"
          export APPIMAGE_EXTRACT_AND_RUN=1

          ./linuxdeploy --appdir AppDir \
            --plugin qt \
            --output appimage

          # 6. Locate final artifact
          IMG=$(find . -maxdepth 1 -name "*.AppImage" ! -name "linuxdeploy*" -type f | head -n1)
          if [ -z "$IMG" ]; then
            echo "::error::No AppImage produced"
            exit 1
          fi
          DEST="Tenjin-${TENJIN_APP_VERSION}-linux.AppImage"
          mv "$IMG" "$DEST"
          echo "TENJIN_APPIMAGE=$DEST" >> "$GITHUB_ENV"
          echo "Built successfully: $IMG"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tenjin-linux
          path: ${{ env.TENJIN_APPIMAGE }}
          if-no-files-found: error
          retention-days: 7
