name: macOS build

# Builds Tenjin for macOS on macos-14 and publishes a .dmg as a Release asset.
# Notes:
#   - CMAKE_MACOSX_BUNDLE=ON is passed at configure time so qt_add_executable
#     produces a .app bundle. Without it,
#     qt_generate_deploy_qml_app_script (called from App/CMakeLists.txt)
#     errors out with "Executable targets have to be app bundles".
#   - Signing is intentionally not done in CI (requires an Apple Developer
#     keychain secret); the built bundle is ad-hoc signed only.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-build:
    runs-on: macos-14
    permissions:
      contents: write

    env:
      TENJIN_APP_NAME: Tenjin
      CCACHE_MAXSIZE: 500M
      CCACHE_COMPRESS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load .env into environment
        run: |
          echo "TENJIN_APP_NAME=Tenjin" >> "$GITHUB_ENV"
          if [ -f .env ]; then
            awk -F= '
              /^[[:space:]]*#/ { next } /^[[:space:]]*$/ { next } NF < 2 { next }
              { k=$1; $1=""; v=substr($0,2);
                sub(/^[[:space:]]+/,"",k); sub(/[[:space:]]+$/,"",k);
                sub(/^[[:space:]]+/,"",v); sub(/[[:space:]]+$/,"",v);
                if (v ~ /^".*"$/ || v ~ /^'\''.*'\''$/) v=substr(v,2,length(v)-2);
                print k "=" v
              }
            ' .env >> "$GITHUB_ENV"
          fi

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install Homebrew tools
        run: brew install ninja ccache create-dmg

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: "mac"
          target: "desktop"
          arch: "clang_64"
          modules: "qtmultimedia"
          dir: ${{ github.workspace }}/Qt
          cache: true

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: macos-ccache-${{ github.sha }}
          restore-keys: |
            macos-ccache-

      - name: Configure (CMake, Ninja)
        run: |
          QT_MAC="${{ github.workspace }}/Qt/Qt/6.8.3/macos"
          export PATH="$QT_MAC/bin:$PATH"
          cmake -G Ninja -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_PREFIX_PATH="$QT_MAC" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="12.0" \
            -DCMAKE_MACOSX_BUNDLE=ON \
            -DMEDIA_SUPPORT=OFF \
            -DWEBVIEW_SUPPORT=OFF \
            -DBUILD_TESTS=OFF \
            -DBUILD_BENCHMARKS=OFF \
            -DSANITIZERS="" \
            -DTENJIN_BUILD_NUMBER="${{ github.run_number }}"

      - name: Build
        run: |
          ccache --max-size=$CCACHE_MAXSIZE
          ccache --zero-stats
          cmake --build build --config Release
          echo "===== ccache stats ====="
          ccache --show-stats

      - name: Locate .app bundle
        run: |
          APP=$(find build -name "$TENJIN_APP_NAME.app" -type d | head -n1)
          if [ -z "$APP" ]; then
            echo "::error::$TENJIN_APP_NAME.app not found in build/"
            echo "All .app bundles:"
            find build -maxdepth 5 -name '*.app' -type d
            exit 1
          fi
          echo "TENJIN_APP_BUNDLE=$APP" >> "$GITHUB_ENV"
          echo "Bundle: $APP"

      - name: macdeployqt
        run: |
          QT_MAC="${{ github.workspace }}/Qt/Qt/6.8.3/macos"
          "$QT_MAC/bin/macdeployqt" "$TENJIN_APP_BUNDLE" -verbose=1 -always-overwrite

      - name: Ad-hoc codesign
        run: |
          codesign --force --deep --sign - --timestamp=none "$TENJIN_APP_BUNDLE"
          codesign -dv --verbose=2 "$TENJIN_APP_BUNDLE" 2>&1 | head -20

      - name: Package .dmg
        run: |
          DMG="${TENJIN_APP_NAME}-${{ github.run_number }}.dmg"
          rm -f "$DMG"
          create-dmg \
            --volname "$TENJIN_APP_NAME" \
            --window-pos 200 120 \
            --window-size 600 360 \
            --icon-size 100 \
            --icon "$(basename $TENJIN_APP_BUNDLE)" 175 180 \
            --hide-extension "$(basename $TENJIN_APP_BUNDLE)" \
            --app-drop-link 425 180 \
            "$DMG" \
            "$(dirname $TENJIN_APP_BUNDLE)" || true
          if [ ! -f "$DMG" ]; then
            echo "::error::.dmg not produced"
            exit 1
          fi
          echo "TENJIN_DMG=$DMG" >> "$GITHUB_ENV"
          du -h "$DMG"

      - name: Publish .dmg to a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: macos-build-${{ github.run_number }}
          name: macOS build ${{ github.run_number }}
          files: ${{ env.TENJIN_DMG }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
