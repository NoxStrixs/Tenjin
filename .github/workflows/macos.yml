name: macOS build

# Builds Tenjin for macOS on macos-14, publishes a .dmg.
#
# The key macOS-specific gotcha (Qt 6.8): SQL driver plugins ship as
# Mach-O bundles in macOS Qt. They can be dlopen'd at runtime but cannot
# be passed to the linker as a positional argument — `ld` rejects them
# with "unsupported mach-o filetype". Anything in App/CMakeLists.txt that
# tries to statically import Qt6::QSQLiteDriverPlugin breaks the macOS
# link step even though it works fine on iOS/Android (which use static
# Qt). The pre-configure sed step below comments out those imports for
# the macOS CI build; the user-facing PATCH_App_CMakeLists_macOS.md has
# the persistent fix (wrap the imports in `if(IOS OR ANDROID)`).
#
# Translations: CI assumes translations/*.ts are committed. lrelease
# compiles them into .qm at build time. Empty stubs are seeded if absent.

on:
  workflow_dispatch:
  # Called by the release orchestrator (release.yml).
  workflow_call:

concurrency:
  group: macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-build:
    runs-on: macos-14
    timeout-minutes: 60
    permissions:
      contents: write

    env:
      TENJIN_APP_NAME: Tenjin
      CCACHE_MAXSIZE: 500M
      CCACHE_COMPRESS: "true"
      CACHE_VERSION: v2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load .env into environment
        run: |
          echo "TENJIN_APP_NAME=Tenjin" >> "$GITHUB_ENV"
          if [ -f .env ]; then
            awk -F= '
              /^[[:space:]]*#/ { next } /^[[:space:]]*$/ { next } NF < 2 { next }
              { k=$1; $1=""; v=substr($0,2);
                sub(/^[[:space:]]+/,"",k); sub(/[[:space:]]+$/,"",k);
                sub(/^[[:space:]]+/,"",v); sub(/[[:space:]]+$/,"",v);
                if (v ~ /^".*"$/ || v ~ /^'\''.*'\''$/) v=substr(v,2,length(v)-2);
                print k "=" v
              }
            ' .env >> "$GITHUB_ENV"
          fi

      - name: Seed translation .ts files if missing
        run: |
          mkdir -p translations
          for lang in ja es fr de zh_CN pt ko it ru ar; do
            f="translations/tenjin_${lang}.ts"
            if [ ! -f "$f" ]; then
              cat > "$f" <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <!DOCTYPE TS>
          <TS version="2.1" language="${lang}">
          </TS>
          EOF
              echo "  seeded empty $f"
            fi
          done

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install Homebrew tools
        run: brew install ninja ccache create-dmg

      - name: Set up Python (for aqtinstall)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: "mac"
          target: "desktop"
          arch: "clang_64"
          modules: "qtmultimedia"
          dir: ${{ github.workspace }}/Qt
          cache: true
          cache-key-prefix: ${{ env.CACHE_VERSION }}-install-qt-macos
          setup-python: false

      - name: Verify Qt Linguist tools (lupdate/lrelease)
        run: |
          QT_MAC="${{ github.workspace }}/Qt/Qt/6.8.3/macos"
          for t in lupdate lrelease; do
            if [ ! -x "$QT_MAC/bin/$t" ]; then
              echo "::error::Qt $t missing at $QT_MAC/bin/$t"
              ls "$QT_MAC/bin" | head -50
              exit 1
            fi
          done
          "$QT_MAC/bin/lrelease" -version

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: ${{ env.CACHE_VERSION }}-macos-ccache-${{ github.sha }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-macos-ccache-

      - name: Debug
        run: |
          echo "===== FULL FILE WITH LINE NUMBERS ====="
          awk '{printf("%4d | %s\n", NR, $0)}' App/CMakeLists.txt

      - name: Cache icon font
        uses: actions/cache@v4
        with:
          path: View/fonts/MaterialSymbolsOutlined.ttf
          key: ${{ env.CACHE_VERSION }}-iconfont-v1

      - name: Configure (CMake, Ninja)
        run: |
          QT_MAC="${{ github.workspace }}/Qt/Qt/6.8.3/macos"
          export PATH="$QT_MAC/bin:$PATH"
          cmake -G Ninja -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_PREFIX_PATH="$QT_MAC" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="12.0" \
            -DCMAKE_MACOSX_BUNDLE=ON \
            -DMEDIA_SUPPORT=OFF \
            -DWEBVIEW_SUPPORT=OFF \
            -DSANITIZERS="" \
            -DTENJIN_BUILD_NUMBER="${{ github.run_number }}"

      - name: Build
        run: |
          ccache --max-size=$CCACHE_MAXSIZE
          ccache --zero-stats
          cmake --build build --config Release
          echo "===== ccache stats ====="
          ccache --show-stats

      - name: Locate .app bundle
        run: |
          APP=$(find build -name "$TENJIN_APP_NAME.app" -type d | head -n1)
          if [ -z "$APP" ]; then
            echo "::error::$TENJIN_APP_NAME.app not found in build/"
            find build -maxdepth 5 -name '*.app' -type d
            exit 1
          fi
          echo "TENJIN_APP_BUNDLE=$APP" >> "$GITHUB_ENV"
          echo "Bundle: $APP"

      - name: macdeployqt
        run: |
          QT_MAC="${{ github.workspace }}/Qt/Qt/6.8.3/macos"
          "$QT_MAC/bin/macdeployqt" "$TENJIN_APP_BUNDLE" -verbose=1 -always-overwrite

      - name: Ad-hoc codesign
        run: |
          codesign --force --deep --sign - --timestamp=none "$TENJIN_APP_BUNDLE"
          codesign -dv --verbose=2 "$TENJIN_APP_BUNDLE" 2>&1 | head -20

      - name: Package .dmg
        run: |
          DMG="${TENJIN_APP_NAME}-${TENJIN_APP_VERSION}-macos.dmg"
          rm -f "$DMG"
          create-dmg \
            --volname "$TENJIN_APP_NAME" \
            --window-pos 200 120 \
            --window-size 600 360 \
            --icon-size 100 \
            --icon "$(basename $TENJIN_APP_BUNDLE)" 175 180 \
            --hide-extension "$(basename $TENJIN_APP_BUNDLE)" \
            --app-drop-link 425 180 \
            "$DMG" \
            "$(dirname $TENJIN_APP_BUNDLE)" || true
          if [ ! -f "$DMG" ]; then
            echo "::error::.dmg not produced"
            exit 1
          fi
          echo "TENJIN_DMG=$DMG" >> "$GITHUB_ENV"
          du -h "$DMG"
      # Codesign + notarize. Skipped unless the Developer ID secrets are
      # present, so the default run ships an unsigned .dmg (user right-click ->
      # Open to bypass Gatekeeper). To enable: add MACOS_CERT_P12_BASE64,
      # MACOS_CERT_PASSWORD, MACOS_NOTARY_APPLE_ID, MACOS_NOTARY_TEAM_ID,
      # MACOS_NOTARY_PASSWORD (see docs/SUBMISSION_CHECKLIST.md).
      - name: Codesign & notarize .dmg
        if: ${{ env.HAS_CERT == 'true' }}
        env:
          HAS_CERT: ${{ secrets.MACOS_CERT_P12_BASE64 != '' }}
        run: |
          set -euo pipefail
          echo "${{ secrets.MACOS_CERT_P12_BASE64 }}" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p actions "$RUNNER_TEMP/build.keychain"
          security unlock-keychain -p actions "$RUNNER_TEMP/build.keychain"
          security import "$RUNNER_TEMP/cert.p12" -k "$RUNNER_TEMP/build.keychain" \
            -P "${{ secrets.MACOS_CERT_PASSWORD }}" -T /usr/bin/codesign
          security list-keychains -s "$RUNNER_TEMP/build.keychain"
          codesign --force --deep --options runtime \
            --sign "Developer ID Application" "$TENJIN_DMG"
          xcrun notarytool submit "$TENJIN_DMG" \
            --apple-id "${{ secrets.MACOS_NOTARY_APPLE_ID }}" \
            --team-id "${{ secrets.MACOS_NOTARY_TEAM_ID }}" \
            --password "${{ secrets.MACOS_NOTARY_PASSWORD }}" --wait
          xcrun stapler staple "$TENJIN_DMG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tenjin-macos
          path: ${{ env.TENJIN_DMG }}
          if-no-files-found: error
          retention-days: 7
