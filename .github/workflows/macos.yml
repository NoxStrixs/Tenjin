name: macOS build

# Builds Tenjin for macOS on macos-14, publishes a .dmg.
#
# The key macOS-specific gotcha (Qt 6.8): SQL driver plugins ship as
# Mach-O bundles in macOS Qt. They can be dlopen'd at runtime but cannot
# be passed to the linker as a positional argument — `ld` rejects them
# with "unsupported mach-o filetype". Anything in App/CMakeLists.txt that
# tries to statically import Qt6::QSQLiteDriverPlugin breaks the macOS
# link step even though it works fine on iOS/Android (which use static
# Qt). The pre-configure sed step below comments out those imports for
# the macOS CI build; the user-facing PATCH_App_CMakeLists_macOS.md has
# the persistent fix (wrap the imports in `if(IOS OR ANDROID)`).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-build:
    runs-on: macos-14
    permissions:
      contents: write

    env:
      TENJIN_APP_NAME: Tenjin
      CCACHE_MAXSIZE: 500M
      CCACHE_COMPRESS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load .env into environment
        run: |
          echo "TENJIN_APP_NAME=Tenjin" >> "$GITHUB_ENV"
          if [ -f .env ]; then
            awk -F= '
              /^[[:space:]]*#/ { next } /^[[:space:]]*$/ { next } NF < 2 { next }
              { k=$1; $1=""; v=substr($0,2);
                sub(/^[[:space:]]+/,"",k); sub(/[[:space:]]+$/,"",k);
                sub(/^[[:space:]]+/,"",v); sub(/[[:space:]]+$/,"",v);
                if (v ~ /^".*"$/ || v ~ /^'\''.*'\''$/) v=substr(v,2,length(v)-2);
                print k "=" v
              }
            ' .env >> "$GITHUB_ENV"
          fi

      # Pre-configure patch. Walks App/CMakeLists.txt and disables explicit
      # references to QSQLiteDriverPlugin which on macOS shared Qt produce
      # `ld: unsupported mach-o filetype` on the bundle plugin. QtSql
      # itself stays linked, and the SQLite driver is loaded at runtime
      # from the deployed Frameworks/plugins/ directory after macdeployqt.
      - name: Patch App/CMakeLists.txt for macOS shared Qt
        run: |
          if [ -f App/CMakeLists.txt ]; then
            if grep -q 'QSQLiteDriverPlugin' App/CMakeLists.txt; then
              cp App/CMakeLists.txt App/CMakeLists.txt.bak
              sed -i '' 's|.*Qt6::QSQLiteDriverPlugin.*|# &  # patched out by macos.yml — Mach-O bundle, can not be statically linked|' App/CMakeLists.txt
              echo "===== patched lines ====="
              grep -n 'QSQLiteDriverPlugin' App/CMakeLists.txt
            else
              echo "No QSQLiteDriverPlugin reference found — nothing to patch."
            fi
          fi

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install Homebrew tools
        run: brew install ninja ccache create-dmg

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: "mac"
          target: "desktop"
          arch: "clang_64"
          modules: "qtmultimedia"
          dir: ${{ github.workspace }}/Qt
          cache: true

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: macos-ccache-${{ github.sha }}
          restore-keys: |
            macos-ccache-

      - name: Configure (CMake, Ninja)
        run: |
          QT_MAC="${{ github.workspace }}/Qt/Qt/6.8.3/macos"
          export PATH="$QT_MAC/bin:$PATH"
          cmake -G Ninja -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_PREFIX_PATH="$QT_MAC" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="12.0" \
            -DCMAKE_MACOSX_BUNDLE=ON \
            -DMEDIA_SUPPORT=OFF \
            -DWEBVIEW_SUPPORT=OFF \
            -DBUILD_TESTS=OFF \
            -DBUILD_BENCHMARKS=OFF \
            -DSANITIZERS="" \
            -DTENJIN_BUILD_NUMBER="${{ github.run_number }}"

      - name: Build
        run: |
          ccache --max-size=$CCACHE_MAXSIZE
          ccache --zero-stats
          cmake --build build --config Release
          echo "===== ccache stats ====="
          ccache --show-stats

      - name: Locate .app bundle
        run: |
          APP=$(find build -name "$TENJIN_APP_NAME.app" -type d | head -n1)
          if [ -z "$APP" ]; then
            echo "::error::$TENJIN_APP_NAME.app not found in build/"
            find build -maxdepth 5 -name '*.app' -type d
            exit 1
          fi
          echo "TENJIN_APP_BUNDLE=$APP" >> "$GITHUB_ENV"
          echo "Bundle: $APP"

      # macdeployqt fixes up runtime plugin loading — it copies the
      # sqldrivers/libqsqlite.dylib bundle into the .app's Contents/PlugIns
      # so QtSql can dlopen it at startup. The macOS CI build can't link
      # against the plugin (Mach-O bundle), but at runtime QtSql discovers
      # it via QCoreApplication::libraryPaths() once macdeployqt has placed
      # it inside the bundle.
      - name: macdeployqt
        run: |
          QT_MAC="${{ github.workspace }}/Qt/Qt/6.8.3/macos"
          "$QT_MAC/bin/macdeployqt" "$TENJIN_APP_BUNDLE" -verbose=1 -always-overwrite

      - name: Ad-hoc codesign
        run: |
          codesign --force --deep --sign - --timestamp=none "$TENJIN_APP_BUNDLE"
          codesign -dv --verbose=2 "$TENJIN_APP_BUNDLE" 2>&1 | head -20

      - name: Package .dmg
        run: |
          DMG="${TENJIN_APP_NAME}-${{ github.run_number }}.dmg"
          rm -f "$DMG"
          create-dmg \
            --volname "$TENJIN_APP_NAME" \
            --window-pos 200 120 \
            --window-size 600 360 \
            --icon-size 100 \
            --icon "$(basename $TENJIN_APP_BUNDLE)" 175 180 \
            --hide-extension "$(basename $TENJIN_APP_BUNDLE)" \
            --app-drop-link 425 180 \
            "$DMG" \
            "$(dirname $TENJIN_APP_BUNDLE)" || true
          if [ ! -f "$DMG" ]; then
            echo "::error::.dmg not produced"
            exit 1
          fi
          echo "TENJIN_DMG=$DMG" >> "$GITHUB_ENV"
          du -h "$DMG"

      - name: Publish .dmg to a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: macos-build-${{ github.run_number }}
          name: macOS build ${{ github.run_number }}
          files: ${{ env.TENJIN_DMG }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
